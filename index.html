<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Explorador Neural · Inmersivo</title>
  <link rel="stylesheet" href="styles.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- Escena 3D fullscreen -->
  <div id="scene-container"></div>

  <!-- Search bar flotante -->
  <header id="search-bar" class="glass">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-text">Explorador Neural</span>
    </div>
    <form id="search-form" autocomplete="off">
      <input
        id="search-input"
        type="text"
        placeholder="Escribe un tema para explorar..."
        spellcheck="false"
      />
      <button type="submit" id="search-button" aria-label="Analizar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
      <button type="button" id="chrono-button" class="chrono-button" disabled title="Recorre la red en orden cronológico (de inicio a fin)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle>
          <polyline points="12 7 12 12 15 14"></polyline>
        </svg>
        <span>Cronológico</span>
      </button>
    </form>
    <div id="search-status" class="search-status"></div>
  </header>

  <!-- Tooltip que sigue al cursor en hover -->
  <div id="tooltip" class="tooltip" aria-hidden="true"></div>

  <!-- Panel lateral con info detallada -->
  <aside id="side-panel" class="side-panel" aria-hidden="true">
    <button id="side-close" class="side-close" aria-label="Cerrar">×</button>
    <div class="side-content">
      <div id="side-image" class="side-image"></div>
      <div class="side-body">
        <span id="side-category" class="side-category"></span>
        <h2 id="side-title" class="side-title"></h2>
        <p id="side-description" class="side-description"></p>
        <div class="side-divider"></div>
        <h3 class="side-subtitle">Wikipedia</h3>
        <p id="side-wiki-extract" class="side-wiki-extract"></p>
        <a id="side-wiki-link" class="side-wiki-link" target="_blank" rel="noopener">
          Ver en Wikipedia →
        </a>
      </div>
    </div>
    <!-- Footer fijo con navegación cronológica -->
    <footer class="side-nav">
      <button id="side-prev" class="side-nav-btn" aria-label="Anterior">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span>Anterior</span>
      </button>
      <span id="side-progress" class="side-progress">— / —</span>
      <button id="side-next" class="side-nav-btn primary" aria-label="Siguiente">
        <span>Siguiente</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </footer>
  </aside>

  <!-- Hint inferior -->
  <div id="hint" class="hint glass">
    <span><kbd>Clic + Arrastrar</kbd> rotar</span>
    <span><kbd>Scroll</kbd> zoom</span>
    <span><kbd>Hover</kbd> ver título</span>
    <span><kbd>Clic</kbd> abrir info</span>
  </div>

  <!-- App principal con cache-bust por timestamp (forzar recarga de módulos en dev) -->
  <script type="module">
    const v = Date.now();
    import('./app.js?v=' + v);
  </script>
</body>
</html>
